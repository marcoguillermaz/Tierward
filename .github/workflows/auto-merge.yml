name: Auto-merge PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  # `contents: write` is required by the `enablePullRequestAutoMerge` GraphQL
  # mutation that `gh pr merge --auto` performs. Scorecard flags this as
  # over-broad, but rolling it back to `read` breaks the workflow with
  # "Resource not accessible by integration". Documented dismissal of
  # code-scanning alert #32.
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    # Auto-squash feature PRs into staging only. Promotion PRs into `main`
    # (head = staging) are merged manually with a merge commit, so staging
    # stays an ancestor of main and the two branches do not diverge.
    if: github.event.pull_request.draft == false && github.event.pull_request.base.ref != 'main'
    steps:
      - name: Enable auto-merge
        run: gh pr merge "$PR_NUMBER" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
