name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "0 5 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        # Pinned to commit SHA per supply-chain hardening (Option C: only 3rd-party
        # actions pinned; GitHub-owned actions/* + github/* trust semver).
        # To bump: resolve new SHA via `gh api repos/ossf/scorecard-action/git/refs/tags/<vX.Y.Z>`.
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
