name: Publish (npm + MCP registry)

on:
  # Triggered by a GitHub Release — kept for manual/legacy release flows.
  release:
    types: [published]
  # Triggered automatically when the CLI version bumps on main (tw-pr flow).
  # The idempotency check below prevents double-publishing when a release is
  # also created for the same version.
  push:
    branches: [main]
    paths:
      - 'packages/cli/package.json'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm test

      # Skip if this exact version is already on npm (prevents double-publish
      # when both the push trigger and a release event fire for the same bump).
      - name: Check if version already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "tierward@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_VERSION already on npm — skipping publish"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --access public

      # ── Publish to the MCP Registry via GitHub OIDC ──────────────────────────
      # No stored token, no expiry: the runner mints a short-lived OIDC token per
      # run (id-token: write above). This replaces manual `mcp-publisher login
      # github`, whose JWT expires and 401s. server.json lives at the repo root,
      # so these steps override the packages/cli working-directory default.
      #
      # MCP registry versions independently from npm: these steps always run so
      # that a re-trigger (e.g. workflow_dispatch after a failed MCP publish) can
      # recover without re-publishing to npm. The publish step uses
      # continue-on-error so a "duplicate version" 400 from the registry does not
      # fail the job — the npm publish already succeeded and is the source of
      # truth.
      - name: Install mcp-publisher
        working-directory: ${{ github.workspace }}
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        working-directory: ${{ github.workspace }}
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: ./mcp-publisher publish
